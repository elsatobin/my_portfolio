<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="320" height="320" rx="48" fill="#0A0A0A"/>

  <!-- Gradient -->
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- E (refined shape) -->
  <g fill="#FFFFFF">
    <rect x="85" y="85" width="18" height="150"/>
    <rect x="85" y="85" width="90" height="18"/>
    <rect x="85" y="150" width="75" height="16"/>
    <rect x="85" y="217" width="90" height="18"/>
  </g>

  <!-- T (refined + gradient) -->
  <g fill="url(#g2)">
    <rect x="175" y="85" width="90" height="18"/>
    <rect x="212" y="85" width="18" height="150"/>
  </g>

  <!-- Subtle bottom accent -->
  <rect x="110" y="260" width="100" height="4" rx="2" fill="url(#g2)" opacity="0.8"/>

</svg>